<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>네모 게임</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }

    /* 로그인 */
    #login-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #1a1a2e; z-index: 100; gap: 12px;
    }
    #login-screen h1 { font-size: 2.2rem; color: #eee; letter-spacing: 2px; }
    #login-screen input {
      padding: 12px 20px; font-size: 1rem;
      border: 2px solid #444; border-radius: 8px;
      background: #2a2a4e; color: white;
      outline: none; width: 260px; text-align: center;
    }
    #login-screen button {
      padding: 12px 0; font-size: 1rem;
      background: #3498db; color: white;
      border: none; border-radius: 8px; cursor: pointer; width: 260px;
    }

    /* 게임 */
    #game-screen { display: none; }
    canvas { display: block; }

    /* 채팅 (왼쪽 위) */
    #chat-container {
      position: fixed; top: 10px; left: 10px;
      width: 260px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; overflow: hidden; z-index: 10;
    }
    #chat-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 5px 10px;
      background: rgba(255,255,255,0.07);
      cursor: pointer; user-select: none;
      font-size: 0.78rem; color: #ccc;
    }
    #chat-toggle-btn { background: none; border: none; color: #ccc; cursor: pointer; font-size: 0.8rem; }
    #chat-body { max-height: 220px; transition: max-height 0.2s; overflow: hidden; }
    #chat-body.collapsed { max-height: 0; }
    #chat-messages { height: 120px; overflow-y: auto; font-size: 0.76rem; padding: 5px 7px; }
    #chat-messages p { margin: 1px 0; line-height: 1.4; }
    #chat-messages .system { color: #999; font-style: italic; }
    #chat-input-row { display: flex; gap: 4px; padding: 5px 7px; border-top: 1px solid rgba(255,255,255,0.08); }
    #chat-input {
      flex: 1; padding: 5px 7px;
      background: #1a1a3e; color: white;
      border: 1px solid #444; border-radius: 5px; font-size: 0.8rem;
    }
    #chat-send {
      padding: 5px 9px; background: #3498db; color: white;
      border: none; border-radius: 5px; cursor: pointer; font-size: 0.8rem;
    }

    /* 미니맵 */
    #minimap {
      position: fixed; top: 10px; right: 10px;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 5px; z-index: 10;
    }

    /* 조이스틱 */
    #joystick {
      position: fixed; bottom: 30px; left: 30px;
      width: 110px; height: 110px; display: none; z-index: 10;
    }
    #joystick-base {
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.08);
      border-radius: 50%; border: 2px solid rgba(255,255,255,0.25);
    }
    #joystick-stick {
      position: absolute; width: 46px; height: 46px;
      background: rgba(255,255,255,0.4); border-radius: 50%;
      top: 32px; left: 32px;
    }
  </style>
</head>
<body>

<div id="login-screen">
  <h1>네모 게임</h1>
  <input id="nickname-input" placeholder="닉네임 입력" maxlength="10" />
  <button onclick="joinGame()">입장</button>
</div>

<div id="game-screen">
  <canvas id="canvas"></canvas>
  <canvas id="minimap" width="120" height="120"></canvas>

  <div id="chat-container">
    <div id="chat-header" onclick="toggleChat()">
      <span>채팅</span>
      <button id="chat-toggle-btn">▲</button>
    </div>
    <div id="chat-body">
      <div id="chat-messages"></div>
      <div id="chat-input-row">
        <input id="chat-input" placeholder="메시지..." autocomplete="off" />
        <button id="chat-send" onclick="sendChat()">전송</button>
      </div>
    </div>
  </div>

  <div id="joystick">
    <div id="joystick-base"></div>
    <div id="joystick-stick"></div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const minimapCanvas = document.getElementById('minimap');
  const mctx = minimapCanvas.getContext('2d');

  const MAP_W = 3000, MAP_H = 3000;
  let serverPlayers = {};
  let renderPlayers = {};
  let keys = {};
  const bubbles = {};
  let ping = 0;
  let chatCollapsed = false;
  const cam = { x: 0, y: 0 };
  const isMobile = 'ontouchstart' in window;

  // 배경 타일 캐싱
  const bgTile = document.createElement('canvas');
  bgTile.width = bgTile.height = 100;
  const bt = bgTile.getContext('2d');
  bt.fillStyle = '#1c3d1c';
  bt.fillRect(0, 0, 100, 100);
  bt.strokeStyle = 'rgba(255,255,255,0.04)';
  bt.lineWidth = 1;
  bt.beginPath(); bt.moveTo(0,0); bt.lineTo(100,0); bt.stroke();
  bt.beginPath(); bt.moveTo(0,0); bt.lineTo(0,100); bt.stroke();

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function joinGame() {
    const nickname = document.getElementById('nickname-input').value.trim();
    if (!nickname) return alert('닉네임을 입력해주세요!');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    if (isMobile) document.getElementById('joystick').style.display = 'block';
    socket.emit('join', nickname);
  }
  document.getElementById('nickname-input').addEventListener('keypress', e => {
    if (e.key === 'Enter') joinGame();
  });

  function toggleChat() {
    chatCollapsed = !chatCollapsed;
    document.getElementById('chat-body').classList.toggle('collapsed', chatCollapsed);
    document.getElementById('chat-toggle-btn').textContent = chatCollapsed ? '▼' : '▲';
  }

  socket.on('players', (data) => {
    serverPlayers = data;
    Object.keys(data).forEach(id => {
      if (!renderPlayers[id]) renderPlayers[id] = { ...data[id] };
    });
    Object.keys(renderPlayers).forEach(id => {
      if (!data[id]) delete renderPlayers[id];
    });
  });

  socket.on('chat', (data) => {
    const div = document.getElementById('chat-messages');
    const p = document.createElement('p');
    if (data.system) {
      p.className = 'system';
      p.textContent = data.message;
    } else {
      const color = serverPlayers[data.id]?.color || '#fff';
      p.innerHTML = '<b style="color:' + color + '">' + data.nickname + '</b>: ' + data.message;
      bubbles[data.id] = { message: data.message, time: Date.now() };
    }
    div.appendChild(p);
    div.scrollTop = div.scrollHeight;
    while (div.children.length > 50) div.removeChild(div.firstChild);
  });

  function sendChat() {
    const input = document.getElementById('chat-input');
    if (input.value.trim()) {
      socket.emit('chat', input.value.trim());
      input.value = '';
    }
  }
  document.getElementById('chat-input').addEventListener('keypress', e => {
    if (e.key === 'Enter') sendChat();
  });

  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    keys[e.key] = true;
  });
  document.addEventListener('keyup', e => { keys[e.key] = false; });

  setInterval(() => {
    socket.emit('move', {
      up: !!(keys['ArrowUp'] || keys['w']),
      down: !!(keys['ArrowDown'] || keys['s']),
      left: !!(keys['ArrowLeft'] || keys['a']),
      right: !!(keys['ArrowRight'] || keys['d']),
    });
  }, 1000 / 30);

  // 조이스틱
  const joystick = document.getElementById('joystick');
  const stick = document.getElementById('joystick-stick');
  joystick.addEventListener('touchmove', e => {
    e.preventDefault();
    const touch = e.touches[0];
    const rect = joystick.getBoundingClientRect();
    const dx = touch.clientX - (rect.left + rect.width / 2);
    const dy = touch.clientY - (rect.top + rect.height / 2);
    const dist = Math.min(35, Math.sqrt(dx*dx + dy*dy));
    const angle = Math.atan2(dy, dx);
    stick.style.transform = `translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px)`;
    socket.emit('move', { up: dy < -12, down: dy > 12, left: dx < -12, right: dx > 12 });
  }, { passive: false });
  joystick.addEventListener('touchend', () => {
    stick.style.transform = '';
    socket.emit('move', { up: false, down: false, left: false, right: false });
  });

  setInterval(() => { socket.emit('ping_check', Date.now()); }, 3000);
  socket.on('pong_check', (ts) => { ping = Date.now() - ts; });

  function lerp(a, b, t) { return a + (b - a) * t; }

  // 미니맵
  let minimapTimer = 0;
  function drawMinimap(now) {
    if (now - minimapTimer < 500) return;
    minimapTimer = now;
    const mw = 120, mh = 120;
    mctx.fillStyle = 'rgba(15,35,15,0.92)';
    mctx.fillRect(0, 0, mw, mh);
    Object.values(renderPlayers).forEach(p => {
      const isMe = p.id === socket.id;
      mctx.fillStyle = isMe ? 'white' : (p.color || '#fff');
      const s = isMe ? 4 : 3;
      mctx.fillRect(p.x / MAP_W * mw - s/2, p.y / MAP_H * mh - s/2, s, s);
    });
    mctx.strokeStyle = 'rgba(255,255,255,0.35)';
    mctx.lineWidth = 1;
    mctx.strokeRect(cam.x / MAP_W * mw, cam.y / MAP_H * mh, canvas.width / MAP_W * mw, canvas.height / MAP_H * mh);
  }

  function render(now) {
    // 보간
    Object.keys(renderPlayers).forEach(id => {
      const r = renderPlayers[id];
      const s = serverPlayers[id];
      if (!s) return;
      r.x = lerp(r.x, s.x, 0.2);
      r.y = lerp(r.y, s.y, 0.2);
      r.color = s.color;
      r.nickname = s.nickname;
    });

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 카메라
    const me = renderPlayers[socket.id];
    if (me) {
      cam.x = Math.max(0, Math.min(MAP_W - canvas.width, me.x - canvas.width / 2));
      cam.y = Math.max(0, Math.min(MAP_H - canvas.height, me.y - canvas.height / 2));
    }

    // 배경
    const pattern = ctx.createPattern(bgTile, 'repeat');
    ctx.save();
    ctx.translate(-cam.x % 100, -cam.y % 100);
    ctx.fillStyle = pattern;
    ctx.fillRect(-100, -100, canvas.width + 200, canvas.height + 200);
    ctx.restore();

    // 맵 경계
    ctx.strokeStyle = '#c0392b';
    ctx.lineWidth = 4;
    ctx.strokeRect(-cam.x, -cam.y, MAP_W, MAP_H);

    // 플레이어
    Object.values(renderPlayers).forEach(p => {
      const sx = p.x - cam.x;
      const sy = p.y - cam.y;
      if (sx < -60 || sx > canvas.width + 60 || sy < -60 || sy > canvas.height + 60) return;

      const isMe = p.id === socket.id;

      ctx.fillStyle = p.color;
      ctx.fillRect(sx - 18, sy - 18, 36, 36);

      if (isMe) {
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.strokeRect(sx - 18, sy - 18, 36, 36);
      }

      // 닉네임
      ctx.fillStyle = 'white';
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(p.nickname, sx, sy - 24);

      // 말풍선
      const bubble = bubbles[p.id];
      if (bubble && Date.now() - bubble.time < 4000) {
        const msg = bubble.message.length > 16 ? bubble.message.slice(0, 16) + '..' : bubble.message;
        ctx.font = '11px sans-serif';
        const bw = ctx.measureText(msg).width + 16;
        const bh = 22;
        const bx = sx - bw / 2;
        const by = sy - 62;
        ctx.fillStyle = 'white';
        ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 5); ctx.fill();
        ctx.beginPath();
        ctx.moveTo(sx - 4, by + bh); ctx.lineTo(sx + 4, by + bh); ctx.lineTo(sx, by + bh + 6);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = '#111';
        ctx.textAlign = 'center';
        ctx.fillText(msg, sx, by + 15);
      }
    });

    // 핑
    ctx.fillStyle = ping < 80 ? '#2ecc71' : ping < 150 ? '#f39c12' : '#e74c3c';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('PING: ' + ping + 'ms', 10, canvas.height - 8);
    if (me) {
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.font = '10px sans-serif';
      ctx.fillText('X:' + Math.floor(me.x) + ' Y:' + Math.floor(me.y), 10, canvas.height - 22);
    }

    drawMinimap(now);
    requestAnimationFrame(render);
  }
  requestAnimationFrame(render);
</script>
</body>
</html>
